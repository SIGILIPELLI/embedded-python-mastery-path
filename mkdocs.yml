      - "03 · GPIO Basics": level-1/03-gpio-basics.md
      - "04 · PWM & ADC": level-1/04-pwm-adc.md
      - "05 · Timers & Interrupts": level-1/05-timers-interrupts.md
      - "06 · I2C & SPI Sensors": level-1/06-i2c-spi-sensors.md
      - "07 · Files & Persistence": level-1/07-files-persistence.md
      - "08 · WiFi & HTTP": level-1/08-wifi-http.md
      - "09 · uasyncio Basics": level-1/09-uasyncio-basics.md
